services:
  mediarr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - mediarr_config:/config
      - mediarr_data:/data
    environment:
      - DATABASE_URL=file:/config/mediarr.db
      - NODE_ENV=development

volumes:
  mediarr_config:
  mediarr_data:
